<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0F1117;
  --bg2:     #161820;
  --card:    #1C1E26;
  --card2:   #21242E;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent:  #FA641E;
  --success: #22D3A4;
  --warning: #FBBF24;
  --danger:  #F87171;
  --info:    #60A5FA;
  --purple:  #A78BFA;
  --text:    #F3F4F6;
  --text2:   #9CA3AF;
  --text3:   #6B7280;
  --mono:    'JetBrains Mono', monospace;

  --mon: #60A5FA;
  --tue: #A78BFA;
  --wed: #22D3A4;
  --thu: #FBBF24;
  --fri: #FA641E;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── TOOLBAR ── */
.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 53px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: rgba(15,17,23,0.97);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.logo { font-size: 15px; font-weight: 800; }
.logo .accent { color: var(--accent); }
.toolbar-badge {
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 999px; border: 1px solid rgba(250,100,30,0.3);
  color: var(--accent); background: rgba(250,100,30,0.08);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.tbtn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 13px; border-radius: 8px; border: 1px solid var(--border2);
  font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; text-decoration: none; color: var(--text2);
  background: rgba(255,255,255,0.04);
}
.tbtn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.tbtn-danger { border-color: rgba(248,113,113,0.3); color: var(--danger); background: rgba(248,113,113,0.06); }
.tbtn-danger:hover { background: rgba(248,113,113,0.12); color: var(--danger); }

/* ── LAYOUT ── */
.page { max-width: 1100px; margin: 0 auto; padding: 77px 24px 80px; }

/* ── HERO ── */
.hero {
  background: linear-gradient(135deg, rgba(250,100,30,0.1) 0%, rgba(96,165,250,0.06) 100%);
  border: 1px solid rgba(250,100,30,0.15);
  border-radius: 20px; padding: 28px 32px; margin-bottom: 28px;
  display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center;
}
.hero-title { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; }
.hero-sub { font-size: 12px; color: var(--text2); line-height: 1.5; }
.hero-week { text-align: right; }
.hero-week-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); margin-bottom: 4px; }
.hero-week-num { font-size: 32px; font-weight: 900; font-family: var(--mono); color: var(--accent); }
.hero-week-date { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── PROGRESS GERAL ── */
.week-progress-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px 24px; margin-bottom: 28px;
}
.week-progress-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.week-progress-title { font-size: 13px; font-weight: 700; }
.week-progress-pct { font-size: 24px; font-weight: 900; font-family: var(--mono); color: var(--accent); }
.week-bar-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
.day-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.day-bar-label { font-size: 10px; font-weight: 700; color: var(--text3); }
.day-bar-track { width: 100%; height: 8px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
.day-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
.day-bar-count { font-size: 10px; font-family: var(--mono); color: var(--text3); }

/* ── TABS DE DIA ── */
.day-tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
.day-tab {
  flex: 1; min-width: 100px; padding: 12px 16px; border-radius: 12px;
  border: 2px solid transparent; cursor: pointer; transition: all 0.2s;
  text-align: center; background: var(--card);
  font-family: 'Poppins', sans-serif;
}
.day-tab:hover { border-color: var(--border2); }
.day-tab.active { border-color: var(--dc, var(--accent)); background: rgba(255,255,255,0.04); }
.day-tab.today { box-shadow: 0 0 0 1px var(--dc, var(--accent)); }
.day-tab-name { font-size: 13px; font-weight: 800; color: var(--dc, var(--text2)); }
.day-tab-full { font-size: 10px; color: var(--text3); margin-bottom: 8px; }
.day-tab-prog { font-size: 10px; font-weight: 700; color: var(--dc, var(--text3)); }
.day-tab-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dc, var(--border2)); margin: 6px auto 4px; }

/* ── CONTEÚDO DO DIA ── */
.day-content { display: none; }
.day-content.active { display: block; }

/* ── BLOCO DE TAREFAS ── */
.task-block {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; margin-bottom: 16px; overflow: hidden;
}
.task-block-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}
.task-block-icon { font-size: 18px; }
.task-block-title { font-size: 13px; font-weight: 800; flex: 1; }
.task-block-badge {
  font-size: 10px; font-weight: 700; padding: 3px 10px;
  border-radius: 6px; background: rgba(255,255,255,0.06); color: var(--text3);
}
.task-block-body { padding: 8px 0; }

/* ── ITEM DE TAREFA ── */
.task-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 20px; transition: background 0.15s; cursor: pointer;
  border-left: 3px solid transparent;
}
.task-item:hover { background: rgba(255,255,255,0.025); }
.task-item.done { background: rgba(34,211,164,0.03); border-left-color: rgba(34,211,164,0.3); }
.task-checkbox {
  width: 18px; height: 18px; border-radius: 5px;
  border: 2px solid var(--border2); flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-size: 11px;
}
.task-item.done .task-checkbox {
  background: var(--success); border-color: var(--success); color: white;
}
.task-text { font-size: 12px; color: var(--text2); line-height: 1.55; flex: 1; }
.task-item.done .task-text { text-decoration: line-through; color: var(--text3); }
.task-tag {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px;
  flex-shrink: 0; margin-top: 1px;
}
.tag-linear { background: rgba(96,165,250,0.1); color: var(--info); }
.tag-equipe { background: rgba(167,139,250,0.1); color: var(--purple); }
.tag-reporte { background: rgba(250,100,30,0.1); color: var(--accent); }
.tag-git { background: rgba(34,211,164,0.1); color: var(--success); }

/* ── BADGE DE DIA COMPLETO ── */
.day-complete-banner {
  display: none; align-items: center; gap: 14px;
  background: linear-gradient(135deg, rgba(34,211,164,0.12), rgba(34,211,164,0.04));
  border: 1px solid rgba(34,211,164,0.25); border-radius: 14px;
  padding: 18px 24px; margin-bottom: 16px;
}
.day-complete-banner.show { display: flex; animation: fadeSlideIn 0.4s ease; }
.day-complete-icon { font-size: 32px; }
.day-complete-text { }
.day-complete-title { font-size: 14px; font-weight: 800; color: var(--success); }
.day-complete-sub { font-size: 11px; color: var(--text3); }

/* ── LINK LINEAR ── */
.linear-link-bar {
  background: rgba(96,165,250,0.06); border: 1px solid rgba(96,165,250,0.15);

.linear-link-bar-icon { font-size: 20px; }
.linear-link-bar-text { flex: 1; font-size: 12px; color: var(--text2); }
.linear-link-bar-text strong { color: var(--info); }
.linear-link-bar a {
  font-size: 11px; font-weight: 700; color: var(--info);
  text-decoration: none; padding: 5px 12px; border-radius: 7px;
  border: 1px solid rgba(96,165,250,0.25); transition: all 0.2s;
}
.linear-link-bar a:hover { background: rgba(96,165,250,0.1); }

/* ── ANIMAÇÃO ── */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--card2); border: 1px solid var(--border2);
  color: var(--text); font-size: 13px; font-weight: 600;
  padding: 12px 24px; border-radius: 12px; z-index: 9999;
  opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVO ── */
@media (max-width: 768px) {
  .hero { grid-template-columns: 1fr; }
  .hero-week { text-align: left; }
  .week-bar-row { grid-template-columns: repeat(5,1fr); }
  .day-tab { min-width: 60px; }
}
</style>

//  ESTADO

function getWeekKey() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}

const WEEK_KEY = 'pigz-plano-' + getWeekKey();
let state = JSON.parse(localStorage.getItem(WEEK_KEY) || '{}');

function saveState() {
  localStorage.setItem(WEEK_KEY, JSON.stringify(state));
}

function toggleTask(id) {
  state[id] = !state[id];
  saveState();
  renderAll();
}

function resetSemana() {
  if (!confirm('Resetar todos os checkboxes da semana? (Os dados da semana atual serão apagados)')) return;
  state = {};
  saveState();
  renderAll();
  showToast('🔄 Semana resetada com sucesso!');
}

// ════════════════════════════════════════

function getWeekInfo() {
  const now = new Date();
  const day = now.getDay(); // 0=dom, 1=seg, ...
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  const fri = new Date(mon);
  fri.setDate(mon.getDate() + 4);
  const fmt = d => d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });
  return { mon, fri, range: `${fmt(mon)} – ${fmt(fri)}` };
}

function getTodayKey() {
  const d = new Date().getDay();
  return ['', 'seg','ter','qua','qui','sex','',''][d] || null;

// ════════════════════════════════════════

function getDayProgress(dayKey) {
  const day = DAYS.find(d => d.key === dayKey);
  if (!day) return { done: 0, total: 0, pct: 0 };
  const allTasks = day.blocks.flatMap(b => b.tasks);
  const done = allTasks.filter(t => state[t.id]).length;
  const total = allTasks.length;
  return { done, total, pct: total ? Math.round((done/total)*100) : 0 };
}

function getWeekProgress() {
  let done = 0, total = 0;
  DAYS.forEach(d => {
    const p = getDayProgress(d.key);
    done += p.done; total += p.total;
  });
  return total ? Math.round((done/total)*100) : 0;
}

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════

let activeDay = getTodayKey() || 'seg';

function renderWeekInfo() {
  const wk = getWeekInfo();
  const wkKey = getWeekKey();
  document.getElementById('week-num').textContent = wkKey.replace('-', ' · S').replace('W','');
  document.getElementById('week-date').textContent = wk.range;
}

function renderWeekProgress() {
  const pct = getWeekProgress();
  document.getElementById('week-pct').textContent = pct + '%';

  const row = document.getElementById('week-bar-row');
  row.innerHTML = DAYS.map(d => {
    const p = getDayProgress(d.key);
    return `
      <div class="day-bar-wrap">
        <div class="day-bar-label" style="color:${d.color}">${d.name}</div>
        <div class="day-bar-track">
          <div class="day-bar-fill" style="width:${p.pct}%;background:${d.color}"></div>
        </div>
        <div class="day-bar-count">${p.done}/${p.total}</div>
      </div>`;
  }).join('');
}

function renderTabs() {
  const today = getTodayKey();
  const container = document.getElementById('day-tabs');
  container.innerHTML = DAYS.map(d => {
    const p = getDayProgress(d.key);
    const isActive = d.key === activeDay;
    const isToday = d.key === today;
    return `
      <div class="day-tab ${isActive?'active':''} ${isToday?'today':''}"
           style="--dc:${d.color}" onclick="setActiveDay('${d.key}')">
        <div class="day-tab-full">${d.full}</div>
        <div class="day-tab-name">${d.emoji} ${d.name}</div>
        <div class="day-tab-dot" style="${p.pct===100?'background:'+d.color:''}"></div>
        <div class="day-tab-prog">${p.pct}%</div>
      </div>`;
  }).join('');
}

function renderDayContent() {
  const container = document.getElementById('day-contents');
  container.innerHTML = DAYS.map(d => {
    const p = getDayProgress(d.key);
    const isActive = d.key === activeDay;
    const isDone = p.total > 0 && p.done === p.total;

    const blocksHtml = d.blocks.map(block => {
      const taskHtml = block.tasks.map(t => {
        const done = !!state[t.id];
        return `
          <div class="task-item ${done?'done':''}" onclick="toggleTask('${t.id}')">
            <div class="task-checkbox">${done?'✓':''}</div>
            <div class="task-text">${t.text}</div>
            <span class="task-tag tag-${t.tag}">${TAG_LABELS[t.tag]}</span>
          </div>`;
      }).join('');

      const linearLink = block.linear ? `
        <div class="linear-link-bar">
          <div class="linear-link-bar-icon">🔗</div>
          <div class="linear-link-bar-text">Abra o <strong>Linear</strong> e acesse as views salvas para coletar os dados de cada item abaixo.</div>
          <a href="https://linear.app" target="_blank">Abrir Linear ↗</a>
        </div>` : '';

      const doneCount = block.tasks.filter(t => state[t.id]).length;
      return `
        <div class="task-block">
          <div class="task-block-header">
            <div class="task-block-icon">${block.icon}</div>
            <div class="task-block-title">${block.title}</div>
            <div class="task-block-badge">${doneCount}/${block.tasks.length}</div>
          </div>
          <div class="task-block-body">
            ${linearLink}
            ${taskHtml}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="day-content ${isActive?'active':''}" id="content-${d.key}">
        <div class="day-complete-banner ${isDone?'show':''}" id="banner-${d.key}">
          <div class="day-complete-icon">🎉</div>
          <div class="day-complete-text">
            <div class="day-complete-title">Todas as tarefas de ${d.full} concluídas!</div>
            <div class="day-complete-sub">Ótimo trabalho. Você está no controle da operação.</div>
          </div>
        </div>
        ${blocksHtml}
      </div>`;
  }).join('');
}

function renderAll() {
  renderWeekInfo();
  renderWeekProgress();
  renderTabs();
  renderDayContent();
}

function setActiveDay(key) {
  activeDay = key;
  renderAll();
}

// ════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════

renderAll();
</script>
</body>
</html>
